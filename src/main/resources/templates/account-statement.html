<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Account Statement</title>
    <style>
        body { font-family: Arial, sans-serif; }
        h1 { text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #000; padding: 5px; text-align: center; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
<h1>Account Statement</h1>
<p>Account Number: <span th:text="${account.accountNumber}"></span></p>
<p>Holder Name: <span th:text="${account.holderName}"></span></p>
<p>Balance: <span th:text="${account.balance}"></span></p>

<table>
    <thead>
    <tr>
        <th>Date</th>
        <th>Amount</th>
        <th>Post Balance</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="t : ${account.transactions}">
        <td th:text="${t.date}"></td>
        <td th:text="${t.amount}"></td>
        <td th:text="${t.postBalance}"></td>
    </tr>
    </tbody>
</table>
</body>
</html>
